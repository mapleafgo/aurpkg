# This is a basic workflow to help you get started with Actions

name: 检查更新

# Controls when the workflow will run
on:
  schedule:
  - cron: "0 */3 * * *"
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      GIT_DISCOVERY_ACROSS_FILESYSTEM: 1

    steps:
      - name: Install git (required by checkout action)
        run: |
          pacman -Sy --noconfirm git
          git config --global --add safe.directory /__w/aurpkg/aurpkg

      - uses: actions/checkout@v6

      - name: Install remaining dependencies
        run: pacman -S --noconfirm python openssh base-devel

      - name: Create SSH key
        env:
          SUPER_SECRET: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh/
          chmod 700 ~/.ssh/
          echo "$SUPER_SECRET" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Init submodules
        env:
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no -i $HOME/.ssh/id_ed25519"
        run: git submodule update --init --recursive

      - name: Run check version script
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          ./check_version.sh

      - name: Commit changes and push
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet || git commit -am "Update from Github Action" && git push --recurse-submodules=on-demand
